# HTTP → HTTPS redirect + suporte a renovação automática do certificado
server {
    listen 80;
    server_name smartsae.co.mz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Frontend
server {
    listen 443 ssl;
    server_name smartsae.co.mz;

    ssl_certificate     /etc/letsencrypt/live/smartsae.co.mz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartsae.co.mz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        proxy_pass http://sae-frontend:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS — API Gateway (porta 8443)
server {
    listen 8443 ssl;
    server_name smartsae.co.mz;

    ssl_certificate     /etc/letsencrypt/live/smartsae.co.mz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartsae.co.mz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        proxy_pass            http://sae-api-gateway:8080;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade            $http_upgrade;
        proxy_set_header      Connection         "upgrade";
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
    }
}
