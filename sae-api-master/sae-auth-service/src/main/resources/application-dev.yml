# CONFIGURAÇÃO DE DESENVOLVIMENTO (DEFAULT)
spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    url: jdbc:postgresql://localhost:5432/sae_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

smartsae:
  security:
    allowed-origin: "*"

logging:
  level:
    org.springframework.security: DEBUG

# Configurações de Mail e SMS em Dev
ozeki:
  url: ${OZEKI_URL:10.2.133.136}
  port: ${OZEKI_PORT:9500}
