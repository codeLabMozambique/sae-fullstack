spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://sae-postgres:5432/sae_db
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      "[mail.smtp.auth]": true
      "[mail.smtp.starttls.enable]": true

smartsae:
  security:
    allowed-origin: "${FRONTEND_URL:*}"

ozeki:
  url: ${OZEKI_URL:localhost}
  port: ${OZEKI_PORT:9500}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
