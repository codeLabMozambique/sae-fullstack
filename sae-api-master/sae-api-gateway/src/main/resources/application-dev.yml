# GATEWAY DEV CONFIG
spring:
  config:
    activate:
      on-profile: dev
  cloud:
    gateway:
      routes:
        - id: sae-auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: sae-content-service
          uri: http://localhost:8082
          predicates:
            - Path=/content/**
          filters:
            - StripPrefix=1
        - id: sae-forum-service
          uri: http://localhost:8083
          predicates:
            - Path=/forum/**
          filters:
            - StripPrefix=1
        - id: sae-quiz-service
          uri: http://localhost:8084
          predicates:
            - Path=/quiz/**
          filters:
            - StripPrefix=1
        - id: sae-academic-service
          uri: http://localhost:8085
          predicates:
            - Path=/academic/**
          filters:
            - StripPrefix=1