server:
  port: 8085

spring:
  application:
    name: sae-academic-service
  
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/sae_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    org.springframework.web: INFO
    codelab.api.smart.sae: DEBUG
