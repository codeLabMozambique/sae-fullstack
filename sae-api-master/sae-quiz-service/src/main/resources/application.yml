server:
  port: 8084

spring:
  application:
    name: sae-quiz-service
  datasource:
    url: jdbc:postgresql://localhost:5432/sae_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

content:
  service:
    url: http://localhost:8082

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}
