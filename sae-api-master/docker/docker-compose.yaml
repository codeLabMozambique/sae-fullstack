version: "3.9"
services:
  mysql:
    image: mysql:8.0 #trocar e colocar a base de dados conforme o documento de arquitetura
    container_name: smartSAE-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123        # senha do usuário root
      MYSQL_DATABASE: smartSAE_hub               # nome do banco inicial
      MYSQL_USER: smartSAE_user                 # usuário adicional
      MYSQL_PASSWORD: mypass             # senha do usuário adicional
    ports:
      - "3306:3306" #o mesmo serve para esta porta!
    volumes:
      - mysql_data:/var/lib/mysql        # persistência dos dados
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # opcional, script de inicialização

volumes:
  mysql_data:
