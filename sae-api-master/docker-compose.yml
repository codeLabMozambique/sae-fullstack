  #   container_name: sae-auth-service
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sae_db
  #     - SPRING_DATASOURCE_USERNAME=postgres
  #     - SPRING_DATASOURCE_PASSWORD=postgres
  #     - SPRING_DATA_REDIS_HOST=redis
  #   depends_on:
  #     - postgres
  #     - redis
  #   networks:
  #     - sae-network

  # sae-content-service:
  #   build: ./sae-content-service
  #   container_name: sae-content-service
  #   ports:
  #     - "8082:8082"
  #   environment:
  #     - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/sae_content
  #   depends_on:
  #     - mongodb
  #   networks:
  #     - sae-network

  # sae-forum-service:
  #   build: ./sae-forum-service
