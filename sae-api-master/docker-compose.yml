version: '3.8'

services:
  # Base de Dados Relacional (PostgreSQL)
  postgres:
    image: postgres:15
    container_name: sae-postgres
    environment:
      - POSTGRES_DB=sae_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    networks:
      - sae-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Base de Dados Documental (MongoDB)
  mongodb:
    image: mongo:latest
    container_name: sae-mongodb
    ports:
      - "27017:27017"
    networks:
      - sae-network
    volumes:
      - mongodb_data:/data/db

  # Camada de Cache (Redis)
  redis:
    image: redis:alpine
    container_name: sae-redis
    ports:
      - "6379:6379"
    networks:
      - sae-network

  # Object Storage (MinIO)
  minio:
    image: minio/minio
    container_name: sae-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=admin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - sae-network
  # Microserviços
  # sae-auth-service:
