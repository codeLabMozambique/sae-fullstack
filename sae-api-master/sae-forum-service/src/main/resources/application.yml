server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: sae-forum-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sae_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:projectompe@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

forum:
  area-mapping:
    Matematica: matematica,algebra,calculo,geometria,estatistica,trigonometria,numeros
    Portugues: portugues,gramatica,literatura,redacao,ortografia,texto,escrita
    Ciencias: ciencias,biologia,fisica,quimica,laboratorio,experimento
    Historia: historia,geografia,sociedade,cultura,politica,economia
    Ingles: ingles,english,grammar,vocabulary,reading,writing
    Informatica: informatica,programacao,algoritmo,computador,software,hardware
  websocket:
    allowed-origins: ${WS_ORIGINS:http://localhost:5173,http://localhost:8080}
  auth-service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:projectompe@gmail.com}
    base-url: ${APP_BASE_URL:http://localhost:5173}

smartsae:
  security:
    allowed-origin: "*"
