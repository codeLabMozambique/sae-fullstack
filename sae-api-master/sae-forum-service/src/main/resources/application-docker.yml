spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://sae-postgres:5432/sae_db
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

forum:
  websocket:
    allowed-origins: "${FRONTEND_URL:http://localhost},http://sae-api-gateway:8080"
  auth-service:
    url: http://sae-auth-service:8081
  academic-service:
    url: http://sae-academic-service:8085
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@sae.mz}
    base-url: ${FRONTEND_URL:http://localhost}

smartsae:
  security:
    allowed-origin: "${FRONTEND_URL:*}"

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
