server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for all unmatched paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve .mjs files with correct MIME type (pdf.worker.min.mjs, etc.)
    location ~* \.mjs$ {
        types { application/javascript mjs; }
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Long-lived cache for hashed static assets
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache the SPA entry point
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
